server {
    listen 80;
    server_name sobat-klinik.hellojonathan.my.id;
    index index.php index.html;
    root /var/www/public;

    error_log  /var/log/nginx/error.log warn;
    access_log /var/log/nginx/access.log;

    client_max_body_size 20M;

    # ─── Gzip ────────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/xml+rss text/javascript
               image/svg+xml;

    # ─── Security ─────────────────────────────────────────────────────────────
    location ~ /\.(?!well-known) {
        deny all;
    }

    # ─── Livewire 4 (hashed prefix) ───────────────────────────────────────────
    # Must be before static asset rules — preview-file returns .png URLs
    # that would otherwise be caught by the static block and return 404.
    location ~ ^/livewire-[\w]+/ {
        fastcgi_pass sobat-klinik-app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root/index.php;
        fastcgi_read_timeout 300;
    }

    location ~* ^(?!/(flux|livewire)/).*\.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        access_log off;
    }

    location ~* ^(?!/(flux|livewire)/).*\.(ico|css|js|gif|jpe?g|png|webp|woff2?|eot|otf|ttf|svg)$ {
        try_files $uri =404;
        expires 6M;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    # ─── Flux & Livewire legacy static assets ─────────────────────────────────
    # location ~ ^/(flux|livewire)/ {
    #     try_files $uri =404;
    #     expires 6M;
    #     access_log off;
    #     add_header Cache-Control "public";
    # }

    # ─── Laravel Reverb (WebSocket) ───────────────────────────────────────────
    # Uncomment when sobat-klinik-reverb container is running
    # location /app {
    #     proxy_http_version 1.1;
    #     proxy_set_header Host $http_host;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header Upgrade $http_upgrade;
    #     proxy_set_header Connection "Upgrade";
    #     proxy_pass http://sobat-klinik-reverb:8080;
    # }

    # ─── Static assets ────────────────────────────────────────────────────────
    location ~* \.(?:ico|css|js|gif|jpe?g|png|webp|woff2?|eot|otf|ttf|svg)$ {
        try_files $uri =404;
        expires 6M;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    # ─── PHP-FPM ──────────────────────────────────────────────────────────────
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass sobat-klinik-app:9000;
        fastcgi_index index.php;
        include fastcgi_params;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;
        fastcgi_read_timeout 300;
    }

    # ─── Laravel catch-all ────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }
}