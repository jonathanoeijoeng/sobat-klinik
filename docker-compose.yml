services:
  sobat-klinik-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sobat-klinik-app
    restart: always
    working_dir: /var/www
    environment:
      - TZ=Asia/Jakarta
      - DB_HOST=sobat-klinik-db
      - DB_PORT=5432
    volumes:
      - ./:/var/www
      # - ./default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./uploads.ini:/usr/local/etc/php/conf.d/uploads.ini
      - /etc/localtime:/etc/localtime:ro
      - /etc/timezone:/etc/timezone:ro
      - ./database:/var/www/database
    env_file:
      - .env
    networks:
      - sobat-klinik-network

  sobat-klinik-web:
    image: nginx:alpine
    container_name: sobat-klinik-nginx
    restart: always
    ports:
      - "8086:80"
    volumes:
      - ./:/var/www
      - ./docker-compose/nginx:/etc/nginx/conf.d/
    networks:
      - sobat-klinik-network
    depends_on:
      - sobat-klinik-app

  sobat-klinik-db:
    image: postgres:16-alpine
    container_name: sobat-klinik-db
    restart: always
    environment:
      - POSTGRES_DB=${DB_DATABASE}
      - POSTGRES_USER=${DB_USERNAME}
      - POSTGRES_PASSWORD=${DB_PASSWORD}
      - TZ=Asia/Jakarta
    ports:
      - "5434:5432" # Pakai 0.0.0.0 agar bisa diakses dari IP 192.168.x.x
    volumes:
      # Data disimpan di folder luar agar tidak hilang saat container dihapus
      - ./docker-compose/postgres/data:/var/lib/postgresql/data
    networks:
      - sobat-klinik-network

  sobat-klinik-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sobat-klinik-worker
    restart: always
    command: php artisan queue:work --tries=3
    environment:
      - DB_HOST=sobat-klinik-db
      - DB_PORT=5432
    volumes:
      - ./:/var/www
    env_file:
      - .env
    networks:
      - sobat-klinik-network
    depends_on:
      - sobat-klinik-app

  sobat-klinik-scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sobat-klinik-scheduler
    restart: always
    command: sh -c "while [ true ]; do php artisan schedule:run --no-interaction & sleep 60; done"
    environment:
      - DB_HOST=sobat-klinik-db
      - DB_PORT=5432
    volumes:
      - ./:/var/www
    env_file:
      - .env
    networks:
      - sobat-klinik-network
    depends_on:
      - sobat-klinik-app

